<!doctype html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site_title }}{% block title %}{% endblock %}</title>
  <meta name="description" content="{{ site_subtitle }}">
  <meta name="theme-color" content="#0b1020">
  <meta property="og:title" content="{{ site_title }}">
  <meta property="og:description" content="{{ site_subtitle }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site_url }}{{ request.path }}">
  <link rel="canonical" href="{{ site_url }}{{ request.path }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <a class="skip-link" href="#main-content">{{ 'Ir para o conteúdo' if current_lang == 'pt' else 'Skip to content' }}</a>
  {% include 'components/navbar.html' %}
  <main class="main-shell" id="main-content">{% block content %}{% endblock %}</main>
  {% include 'components/footer.html' %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
