{% extends 'base.html' %}
{% block content %}
<section class="page-hero compact"><div class="container"><h1>{{ ui.title }}</h1><p>{{ ui.subtitle }}</p></div></section>
<section class="section-block">
  <div class="container">
    <div class="row g-4">
      {% for demo in demos %}
      <div class="col-md-6">
        <div class="tf-card h-100">
          <h3>{{ demo.title }}</h3>
          <p>{{ demo.description }}</p>
          <div class="d-flex flex-wrap gap-2 mt-3">{% for tag in demo.tags %}<span class="chip">{{ tag }}</span>{% endfor %}</div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
